<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser PDF Combiner</title>
    
    <!-- pdf-lib library -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            background-color: #f4f4f9;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        #status {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }

        /* --- NEW STYLES FOR THE LIST --- */
        #fileList {
            list-style-type: none;
            padding: 0;
            margin: 20px 0;
            text-align: left;
        }
        .file-item {
            background-color: #e9ecef;
            margin: 5px 0;
            padding: 10px 15px;
            border-radius: 5px;
            border: 1px solid #ced4da;
            cursor: grab; /* Shows a 'grab' hand icon */
            display: flex;
            align-items: center;
        }
        .file-item:active {
            cursor: grabbing; /* Shows a closed fist when dragging */
            opacity: 0.7;
        }
        /* A little icon to show it's draggable */
        .drag-handle {
            margin-right: 10px;
            color: #6c757d;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Merge PDFs Locally</h2>
        <p>Select PDFs, then <strong>drag and drop the list items below</strong> to set the correct order.</p>
        
        <input type="file" id="fileInput" accept="application/pdf" multiple>
        
        <!-- NEW: This is where our reorderable list will appear -->
        <ul id="fileList"></ul>
        
        <button id="mergeBtn" style="display:none;">Combine PDFs</button>
        
        <div id="status"></div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const mergeBtn = document.getElementById('mergeBtn');
        const statusDiv = document.getElementById('status');
        const fileListContainer = document.getElementById('fileList');

        // NEW: An array to hold our files so we can change their order
        let filesArray = []; 
        let dragStartIndex; // Remembers which item we picked up

        // Listen for when files are selected
        fileInput.addEventListener('change', (e) => {
            // Convert the unchangeable FileList into a flexible Array
            filesArray = Array.from(e.target.files);
            
            // Show the merge button if we have files
            mergeBtn.style.display = filesArray.length > 0 ? 'inline-block' : 'none';
            statusDiv.innerText = "";
            
            renderFileList();
        });

        // NEW: Function to draw the list on the screen
        function renderFileList() {
            fileListContainer.innerHTML = ''; // Clear the current list

            filesArray.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.draggable = true; // Makes HTML5 drag and drop work
                li.dataset.index = index; // Store the current position

                // Add a visual drag handle icon (≡) and the file name
                li.innerHTML = `<span class="drag-handle">&#8801;</span> ${file.name}`;

                // Drag and Drop Events
                li.addEventListener('dragstart', handleDragStart);
                li.addEventListener('dragover', handleDragOver);
                li.addEventListener('drop', handleDrop);
                li.addEventListener('dragenter', e => e.preventDefault());

                fileListContainer.appendChild(li);
            });
        }

        // --- Drag and Drop Logic ---
        function handleDragStart(e) {
            dragStartIndex = +e.target.closest('li').dataset.index;
        }

        function handleDragOver(e) {
            e.preventDefault(); // Required to allow dropping
        }

        function handleDrop(e) {
            e.preventDefault();
            const dragEndIndex = +e.target.closest('li').dataset.index;
            
            // Move the file in our array
            const itemToMove = filesArray.splice(dragStartIndex, 1)[0];
            filesArray.splice(dragEndIndex, 0, itemToMove);
            
            // Redraw the list with the new order
            renderFileList();
        }

        // --- The Merge Logic (Updated to use filesArray) ---
        mergeBtn.addEventListener('click', async () => {
            if (filesArray.length < 2) {
                statusDiv.innerText = "Please select at least 2 PDF files to combine.";
                statusDiv.style.color = "red";
                return;
            }

            statusDiv.innerText = "Combining PDFs... please wait.";
            statusDiv.style.color = "blue";
            mergeBtn.disabled = true;

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();

                // CHANGED: We now loop through our flexible filesArray
                for (let i = 0; i < filesArray.length; i++) {
                    const file = filesArray[i];
                    const fileArrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await PDFLib.PDFDocument.load(fileArrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                    
                    copiedPages.forEach((page) => {
                        mergedPdf.addPage(page);
                    });
                }

                const mergedPdfFile = await mergedPdf.save();
                triggerDownload(mergedPdfFile, "combined_document.pdf");

                statusDiv.innerText = "Success! Your combined PDF is downloading.";
                statusDiv.style.color = "green";

            } catch (error) {
                console.error(error);
                statusDiv.innerText = "An error occurred while combining the PDFs.";
                statusDiv.style.color = "red";
            } finally {
                mergeBtn.disabled = false;
            }
        });

        function triggerDownload(byteData, filename) {
            const blob = new Blob([byteData], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
